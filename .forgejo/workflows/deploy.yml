name: Build and deploy site

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ThirtyOneIron

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Site
        run: pnpm run build

      - name: Deploy to site directory
        run: |
          mkdir -p /var/www/arduinohates.me
          rsync -av --delete dist/ /var/www/arduinohates.me/
